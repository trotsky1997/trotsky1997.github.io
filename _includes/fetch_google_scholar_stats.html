<script>
  window.addEventListener("DOMContentLoaded", function () {
    var totalCitationElement = document.getElementById("total_cit");
    var citationElements = document.getElementsByClassName("show_paper_citations");
    if (!totalCitationElement && citationElements.length === 0) return;

    var statsUrl = "{{ '/google-scholar-stats/gs_data.json' | relative_url }}";

    function fetchJson(url) {
      return fetch(url, { cache: "force-cache" }).then(function (response) {
        if (!response.ok) throw new Error("Citation stats request failed: " + response.status);
        return response.json();
      });
    }

    function renderCitationStats(data) {
      if (totalCitationElement && data.citedby) {
        totalCitationElement.textContent = data.citedby;
      }

      Array.prototype.forEach.call(citationElements, function (element) {
        var paperId = element.getAttribute("data");
        if (data.publications && data.publications[paperId]) {
          element.textContent = "| Citations: " + data.publications[paperId].num_citations;
        }
      });
    }

    fetchJson(statsUrl)
      .then(renderCitationStats)
      .catch(function () {});
  });
</script>
