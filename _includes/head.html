<meta charset="utf-8">

{% include seo.html %}

<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">

<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
<link rel="alternate" type="text/markdown" title="{{ site.title }} llms.txt" href="{{ '/llms.txt' | absolute_url }}">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
{% assign asset_version = site.time | date: "%Y%m%d%H%M%S" %}
{% include critical-css.html %}
<link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}?v={{ asset_version }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ asset_version }}"></noscript>

<meta http-equiv="cleartype" content="on">
