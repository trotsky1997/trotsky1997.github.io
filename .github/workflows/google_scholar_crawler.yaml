name: Get Citation Data

permissions:
  contents: write

on: 
 schedule:
  - cron:  '0 8 * * *'
 workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run
      run: |
        python3 -m pip install -r google_scholar_crawler/requirements.txt
        RESULTS_DIR=google-scholar-stats python3 google_scholar_crawler/main.py
        git config --local user.name "${GITHUB_ACTOR}"
        git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git add google-scholar-stats/*.json
        git diff --cached --quiet || git commit -m "Update Google Scholar citation data"
        git push origin HEAD:main
      env: 
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID || 'vxAO250AAAAJ' }}
