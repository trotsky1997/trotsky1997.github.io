<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">CiteClaw reference pipeline</title>
  <desc id="desc">A pipeline diagram showing messy research inputs flowing through CiteClaw normalization, metadata resolution, enrichment, export, and agent surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f7f2"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #12202f; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #425466; }
      .label { font: 700 18px Arial, sans-serif; fill: #172033; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #d7e0e8; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .stage { fill: #fefefe; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .input { fill: #eef6ff; stroke: #8ab4e8; }
      .resolve { fill: #f4f9ef; stroke: #9ac27d; }
      .export { fill: #fff7e8; stroke: #e2b765; }
      .agent { fill: #f4f0ff; stroke: #aa96dc; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>

  <text x="70" y="70" class="title">CiteClaw: Reference Infrastructure for Agentic Research</text>
  <text x="72" y="104" class="subtitle">Messy identifiers become structured bibliography state that humans can inspect and agents can call.</text>

  <rect x="64" y="145" width="210" height="345" class="box input"/>
  <text x="92" y="184" class="label">Inputs</text>
  <text x="92" y="224" class="small">DOI</text>
  <text x="92" y="255" class="small">URL</text>
  <text x="92" y="286" class="small">arXiv</text>
  <text x="92" y="317" class="small">PMID / PMCID</text>
  <text x="92" y="348" class="small">ISBN / QID</text>
  <text x="92" y="379" class="small">Local PDF</text>
  <text x="92" y="410" class="small">Zotero item</text>
  <text x="92" y="441" class="small">Title search</text>

  <path d="M274 318 H336" class="line"/>

  <rect x="336" y="145" width="220" height="345" class="box"/>
  <text x="366" y="184" class="label">Normalize</text>
  <text x="366" y="224" class="small">Classify identifier</text>
  <text x="366" y="255" class="small">Clean redirects</text>
  <text x="366" y="286" class="small">Probe PDF signals</text>
  <text x="366" y="317" class="small">Prefer canonical IDs</text>
  <line x1="366" y1="346" x2="526" y2="346" class="muted-line"/>
  <text x="366" y="379" class="tiny">Output: candidate citation</text>
  <text x="366" y="403" class="tiny">with known input type</text>

  <path d="M556 318 H618" class="line"/>

  <rect x="618" y="145" width="250" height="345" class="box resolve"/>
  <text x="648" y="184" class="label">Resolve and Enrich</text>
  <text x="648" y="224" class="small">Zotero translators</text>
  <text x="648" y="255" class="small">Crossref</text>
  <text x="648" y="286" class="small">Semantic Scholar</text>
  <text x="648" y="317" class="small">OpenAlex</text>
  <text x="648" y="348" class="small">PubMed</text>
  <text x="648" y="379" class="small">Web metadata</text>
  <text x="648" y="410" class="small">Wayback fallback</text>
  <text x="648" y="441" class="small">Local cache</text>

  <path d="M868 318 H930" class="line"/>

  <rect x="930" y="145" width="210" height="150" class="box export"/>
  <text x="960" y="184" class="label">Export</text>
  <text x="960" y="224" class="small">BibTeX</text>
  <text x="960" y="255" class="small">Zotero JSON</text>
  <text x="960" y="286" class="small">CSL / MediaWiki</text>

  <rect x="930" y="340" width="210" height="150" class="box agent"/>
  <text x="960" y="379" class="label">Surfaces</text>
  <text x="960" y="419" class="small">CLI and batch</text>
  <text x="960" y="450" class="small">HTTP and MCP</text>
  <text x="960" y="481" class="small">Agent skill</text>

  <path d="M1035 295 V340" class="line"/>

  <rect x="240" y="535" width="720" height="52" class="stage"/>
  <text x="275" y="568" class="small">Design rule: tools perform actions; the skill preserves the bibliography workflow as agent behavior.</text>
</svg>
